          background-size:cover;
          background-position:center;
        }
        .inner{position:relative;z-index:1;}
        .logo{text-align:center;margin-bottom:26px}
        .logo-icon{
          width:76px;height:76px;
          border-radius:18px;
          overflow:hidden;
          margin:0 auto 14px;
          box-shadow:0 4px 16px rgba(0,0,0,0.2);
        }
        .logo-icon img{width:100%;height:100%;object-fit:cover;display:block;}
        .logo h1{font-size:23px;font-weight:800;color:#1a2e1e;letter-spacing:-0.3px}
        .logo p{font-size:13.5px;color:#8a9e8c;margin-top:3px;font-weight:400}
        .tabs{
          display:flex;background:rgba(220,220,210,0.7);
          border-radius:14px;padding:4px;margin-bottom:24px;
          backdrop-filter:blur(4px);
        }
        .tab{
          flex:1;padding:10px 8px;text-align:center;
          font-size:14.5px;font-weight:700;
          color:#8a9e8c;border-radius:10px;
          cursor:pointer;border:none;background:transparent;
          transition:all .2s;font-family:inherit;
        }
        .tab.active{background:#ffffff;color:#1a2e1e;box-shadow:0 1px 6px rgba(0,0,0,0.13);}
        .form-section{display:none}.form-section.visible{display:block}
        .form-group{margin-bottom:14px}
        label{display:block;font-size:13px;font-weight:600;color:#3a4a3c;margin-bottom:6px}
        input{
          width:100%;padding:15px 16px;
          border:1.5px solid #e2e8e3;
          border-radius:14px;
          font-family:inherit;font-size:15px;color:#1a2e1e;
          background:#ffffff;outline:none;
          transition:border-color .2s;-webkit-appearance:none;
        }
        input::placeholder{color:#bec9c0;}
        input:focus{border-color:#2d6a3f;}
        .btn-primary{
          width:100%;padding:15px;
          background:#1e5c30;
          color:#ffffff;border:none;border-radius:14px;
          font-family:inherit;font-size:16px;font-weight:800;
          cursor:pointer;margin-top:6px;
          -webkit-tap-highlight-color:transparent;
          letter-spacing:0.2px;
        }
        .btn-primary:active{background:#164a25;}
        .msg-box{border-radius:10px;padding:10px 14px;font-size:13px;font-weight:500;margin-bottom:14px;display:none}
        .msg-box.show{display:block}
        .msg-box.error{background:#fef2f2;border:1px solid #fecaca;color:#dc2626}
        .msg-box.success{background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d}
        .demo-hint{text-align:center;margin-top:16px;font-size:12.5px;color:#a0b0a2}
        .demo-hint span{color:#2d6a3f;font-weight:700;cursor:pointer}
    </style>
</head>

            <button class="tab active" id="tab-login" onclick="switchTab('login')">Ingresar</button>
            <button class="tab" id="tab-reg" onclick="switchTab('register')">Registrarse</button>
        </div>

        <div id="msg-box" class="msg-box"></div>

        <div id="login-form" class="form-section visible">
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" id="login-user" placeholder="tu usuario" autocomplete="username">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
            </div>
            <button class="btn-primary" onclick="doLogin()">Entrar</button>
        </div>

        <div id="register-form" class="form-section">
            <div class="form-group">
                <label>Nombre completo</label>
                <input type="text" id="reg-name" placeholder="Ej: Carlos López">
            </div>
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" id="reg-user" placeholder="elige un nombre de usuario">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="reg-pass" placeholder="mínimo 4 caracteres">
            </div>
            <button class="btn-primary" onclick="doRegister()">Crear cuenta</button>
        </div>

        <p class="demo-hint"> <span onclick="fillDemo()"></span></p>
    </div>
</div>
<script>
    function switchTab(tab){
      const isLogin=tab==='login';
      document.getElementById('login-form').classList.toggle('visible',isLogin);
      document.getElementById('register-form').classList.toggle('visible',!isLogin);
      document.getElementById('tab-login').classList.toggle('active',isLogin);
      document.getElementById('tab-reg').classList.toggle('active',!isLogin);
      hideMsg();
    }
    function showMsg(text,type){const el=document.getElementById('msg-box');el.textContent=text;el.className='msg-box show '+type;}
    function hideMsg(){document.getElementById('msg-box').className='msg-box';}
    function fillDemo(){switchTab('login');document.getElementById('login-user').value='carlos';document.getElementById('login-pass').value='1234';}
    async function doLogin(){
      hideMsg();
      const username=document.getElementById('login-user').value.trim();
      const password=document.getElementById('login-pass').value;
      if(!username||!password)return showMsg('Completa todos los campos','error');
      try{
        const res=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
        const data=await res.json();
        if(data.ok){window.location.href='/dashboard';}else{showMsg(data.msg||'Usuario o contraseña incorrectos','error');}
      }catch(e){showMsg('Error de conexión con el servidor','error');}
    }
    async function doRegister(){
      hideMsg();
      const name=document.getElementById('reg-name').value.trim();
      const username=document.getElementById('reg-user').value.trim();
      const password=document.getElementById('reg-pass').value;
      if(!name)return showMsg('Escribe tu nombre completo','error');
      if(!username)return showMsg('Elige un nombre de usuario','error');
      if(!password||password.length<4)return showMsg('La contraseña debe tener al menos 4 caracteres','error');
      try{
        const res=await fetch('/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,username,password})});
        const data=await res.json();
        if(data.ok){switchTab('login');document.getElementById('login-user').value=username;showMsg('✅ Cuenta creada. Ahora ingresa.','success');}
        else{showMsg(data.msg||'Error al registrar','error');}
      }catch(e){showMsg('Error de conexión con el servidor','error');}
    }
    document.addEventListener('keydown',e=>{
      if(e.key!=='Enter')return;
      document.getElementById('login-form').classList.contains('visible')?doLogin():doRegister();
    });
</script>
</body>
</html>
